<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1200" height="200" fill="#0a0a0a" rx="12"/>

  <!-- Steps -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <!-- Step boxes human -->
    <g>
      <rect x="40" y="56" width="130" height="52" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <circle cx="60" cy="82" r="11" fill="#1c1800" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="60" y="87" fill="#EFB93D" font-size="11" font-weight="800">1</text>
      <text x="120" y="77" fill="#d0d0d0" font-size="10">Comprendre</text>
      <text x="120" y="92" fill="#d0d0d0" font-size="10">le métier</text>
    </g>
    <g>
      <rect x="186" y="56" width="130" height="52" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <circle cx="206" cy="82" r="11" fill="#1c1800" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="206" y="87" fill="#EFB93D" font-size="11" font-weight="800">2</text>
      <text x="266" y="77" fill="#d0d0d0" font-size="10">Modéliser</text>
      <text x="266" y="92" fill="#d0d0d0" font-size="10">les données</text>
    </g>
    <g>
      <rect x="332" y="56" width="130" height="52" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <circle cx="352" cy="82" r="11" fill="#1c1800" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="352" y="87" fill="#EFB93D" font-size="11" font-weight="800">3</text>
      <text x="412" y="77" fill="#d0d0d0" font-size="10">Définir</text>
      <text x="412" y="92" fill="#d0d0d0" font-size="10">l'architecture</text>
    </g>
    <g>
      <rect x="478" y="56" width="130" height="52" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <circle cx="498" cy="82" r="11" fill="#1c1800" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="498" y="87" fill="#EFB93D" font-size="11" font-weight="800">4</text>
      <text x="558" y="77" fill="#d0d0d0" font-size="10">Décider</text>
      <text x="558" y="92" fill="#d0d0d0" font-size="10">le MVP</text>
    </g>
    <g>
      <rect x="624" y="56" width="130" height="52" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <circle cx="644" cy="82" r="11" fill="#1c1800" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="644" y="87" fill="#EFB93D" font-size="11" font-weight="800">5</text>
      <text x="704" y="77" fill="#d0d0d0" font-size="10">Concevoir</text>
      <text x="704" y="92" fill="#d0d0d0" font-size="10">les features</text>
    </g>

    <!-- AI Step - different style -->
    <g>
      <rect x="820" y="44" width="320" height="76" rx="10" fill="#1a1400" stroke="#EFB93D" stroke-width="1.5"/>
      <text x="980" y="78" fill="#EFB93D" font-size="13" font-weight="800">6 · Utiliser l'IA</text>
      <text x="980" y="100" fill="#7a7a7a" font-size="10" font-weight="500">exécution — jamais décision</text>
    </g>
  </g>

  <!-- Arrows between steps -->
  <g stroke="#EFB93D" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="170" y1="82" x2="184" y2="82" marker-end="url(#arr)"/>
    <line x1="316" y1="82" x2="330" y2="82" marker-end="url(#arr)"/>
    <line x1="462" y1="82" x2="476" y2="82" marker-end="url(#arr)"/>
    <line x1="608" y1="82" x2="622" y2="82" marker-end="url(#arr)"/>
    <line x1="754" y1="82" x2="818" y2="82" marker-end="url(#arr)"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6Z" fill="#EFB93D" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Human bracket label -->
  <rect x="40" y="30" width="714" height="4" rx="2" fill="#EFB93D" opacity="0.2"/>
  <text x="40" y="24" fill="#EFB93D" font-size="9" font-weight="700" letter-spacing="0.12em">RÉFLEXION HUMAINE — ÉTAPES 1 → 5</text>

  <!-- Bottom note -->
  <text x="600" y="175" text-anchor="middle" fill="#444" font-size="11" font-style="italic">L'IA est un accélérateur d'exécution. Elle ne remplace jamais la réflexion produit.</text>
</svg>
