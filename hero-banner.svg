<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
    <mask id="gridmask">
      <radialGradient id="rm" cx="70%" cy="30%" r="65%">
        <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <rect width="1200" height="280" fill="url(#rm)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="280" fill="url(#grid)" mask="url(#gridmask)"/>

  <!-- Gold accent line -->
  <rect x="60" y="80" width="3" height="120" fill="#EFB93D" rx="2"/>

  <!-- Main headline -->
  <text x="82" y="122" font-size="13" font-weight="700" letter-spacing="0.18em" text-transform="uppercase" fill="#EFB93D" opacity="0.9">FOUNDER · SCROLL TO TOP</text>
  <text x="82" y="176" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="-0.03em">Software Engineer</text>
  <text x="82" y="218" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="-0.03em" opacity="0.45">&amp; Product Builder</text>

  <!-- Right side: URL -->
  <text x="1140" y="236" font-size="13" font-weight="600" fill="#EFB93D" text-anchor="end" letter-spacing="0.04em">scrolltotop.fr</text>
  <line x1="1000" y1="240" x2="1140" y2="240" stroke="#EFB93D" stroke-width="1" opacity="0.4"/>
</svg>
